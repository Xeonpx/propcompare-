async function extractFromPDF(base64Data) {
  const prompt = `You are a Malaysian real estate data extractor. Extract structured property project information from this PDF.
Return ONLY a raw JSON object — no markdown, no code fences, no explanation.
{
  "name": "Project Name",
  "developer": "Developer Name",
  "location": "Full address",
  "district": "District e.g. Petaling Jaya",
  "state": "State e.g. Selangor",
  "nearestCity": "Nearest city or LRT station",
  "distanceFromCity": "e.g. 3.5 km",
  "launchDate": "Month YYYY",
  "completionDate": "Q1 YYYY or Month YYYY",
  "tenure": "Freehold or Leasehold",
  "bumiDiscount": "e.g. 5% or empty",
  "cashBack": true,
  "cashBackDetails": "details or empty",
  "maintenanceFee": "e.g. RM 0.35/sf or empty",
  "carParks": "e.g. 2 or empty",
  "totalUnits": "e.g. 350 or empty",
  "floors": "e.g. 28 or empty",
  "layouts": [
    { "name": "A1", "beds": "2", "baths": "2", "sizeSqft": "900", "grossPrice": "500000", "netPrice": "450000", "psf": "500" }
  ],
  "notes": "any other relevant notes"
}
Rules:
- Extract EVERY distinct layout/unit type separately.
- netPrice = stated nett price. If not stated, use 90% of grossPrice.
- psf = round(netPrice / sizeSqft).
- All numeric values as plain strings without commas or currency symbols.
- Unknown/missing fields: empty string. Boolean cashBack: true/false.`;

  const resp = await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 4096,
      messages: [{
        role: "user",
        content: [{
          type: "document",
          source: { type: "base64", media_type: "application/pdf", data: base64Data.split(",")[1] }
        }, {
          type: "text",
          text: prompt
        }]
      }]
    })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);
  const text = data.content.map(b => b.text || "").join("").replace(/```json|```/g, "").trim();
  return JSON.parse(text);
}

function exportData(projects) {
  const json = JSON.stringify(projects, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `PropCompare_data_${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function App() {
  const [projects, setProjects] = useState(() => load());
  const [editing, setEditing] = useState(null);
  const [view, setView] = useState("dashboard");
  const [showComparison, setShowComparison] = useState(false);
  const [loading, setLoading] = useState(false);
  const [loadingMsg, setLoadingMsg] = useState("");
  const [toast, setToast] = useState(null);
  const [filterBed, setFilterBed] = useState("all");
  const [searchQ, setSearchQ] = useState("");
  const pdfRef = useRef();
  const importRef = useRef();

  useEffect(() => { save(projects); }, [projects]);

  const showToast = (msg, type = "success") => { setToast({ msg, type }); setTimeout(() => setToast(null), 4000); };
  const cur = editing ? projects.find(p => p.id === editing) : null;

  const openNew = () => {
    const p = { ...EMPTY_PROJECT, id: uid(), layouts: [{ ...EMPTY_LAYOUT, id: uid() }], images: [], pdfSources: [], createdAt: new Date().toISOString() };
    setProjects(prev => [...prev, p]);
    setEditing(p.id);
    setView("form");
  };
  const openEdit = id => { setEditing(id); setView("form"); };
  const deleteProject = id => {
    if (!confirm("Delete this project?")) return;
    setProjects(prev => prev.filter(p => p.id !== id));
    if (editing === id) { setEditing(null); setView("dashboard"); }
    showToast("Project deleted");
  };
  const updateField = (field, value) => setProjects(prev => prev.map(p => p.id === editing ? { ...p, [field]: value, updatedAt: new Date().toISOString() } : p));
  const updateLayout = (lid, updated) => setProjects(prev => prev.map(p => p.id === editing ? { ...p, layouts: p.layouts.map(l => l.id === lid ? updated : l) } : p));
  const addLayout = () => setProjects(prev => prev.map(p => p.id === editing ? { ...p, layouts: [...p.layouts, { ...EMPTY_LAYOUT, id: uid() }] } : p));
  const deleteLayout = lid => setProjects(prev => prev.map(p => p.id === editing ? { ...p, layouts: p.layouts.filter(l => l.id !== lid) } : p));

  const handlePDFUpload = async e => {
    const files = Array.from(e.target.files);
    for (const file of files) {
      if (cur?.pdfSources?.includes(file.name)) { showToast(`"${file.name}" already processed`, "warn"); continue; }
      setLoading(true);
      setLoadingMsg(`AI reading "${file.name}"…`);
      try {
        const b64 = await toBase64(file);
        const extracted = await extractFromPDF(b64);
        setProjects(prev => prev.map(p => {
          if (p.id !== editing) return p;
          const m = { ...p };
          ["name","developer","location","district","state","nearestCity","distanceFromCity","launchDate","completionDate","tenure","cashBackDetails","maintenanceFee","carParks","totalUnits","floors","notes","bumiDiscount"].forEach(f => { if (m[f] === "" && extracted[f] !== undefined) m[f] = extracted[f]; });
          if (extracted.cashBack !== undefined && !m.cashBack) m.cashBack = extracted.cashBack;
          if (extracted.layouts?.length) {
            m.layouts = extracted.layouts.map(l => {
              const gross = l.grossPrice ? Number(l.grossPrice) : null;
              const net = l.netPrice ? Number(l.netPrice) : gross ? Math.round(gross * 0.9) : null;
              const size = l.sizeSqft ? Number(l.sizeSqft) : null;
              const psf = net && size ? Math.round(net / size) : l.psf ? Number(l.psf) : null;
              return { id: uid(), name: l.name || "", beds: String(l.beds || ""), baths: String(l.baths || ""), sizeSqft: size ? String(size) : "", grossPrice: gross ? String(gross) : "", netPrice: net ? String(net) : "", psf: psf ? String(psf) : "" };
            });
          }
          m.pdfSources = [...(p.pdfSources || []), file.name];
          m.updatedAt = new Date().toISOString();
          return m;
        }));
        showToast(`✓ "${file.name}" extracted successfully`);
      } catch (err) {
        showToast(`Error: ${err.message}`, "error");
      } finally {
        setLoading(false);
        setLoadingMsg("");
      }
    }
    e.target.value = "";
  };

  const handleImport = async e => {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!Array.isArray(data)) throw new Error("Invalid format");
      if (!confirm(`Import ${data.length} project(s)? This will ADD to existing projects.`)) return;
      setProjects(prev => [...prev, ...data]);
      showToast(`Imported ${data.length} project(s)`);
    } catch (err) { showToast("Import failed: " + err.message, "error"); }
    e.target.value = "";
  };

  const doDownload = projs => {
    const html = buildReportHTML(projs);
    const blob = new Blob([html], { type: "text/html;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const name = projs.length === 1 ? (projs[0].name || "project").replace(/[^a-z0-9]/gi, "_").toLowerCase() : "all_projects";
    a.href = url;
    a.download = `PropCompare_${name}_${new Date().toISOString().slice(0, 10)}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    showToast("Report downloaded — open file and press Ctrl+P to save as PDF");

<script>
let deferredPrompt;

document.addEventListener("DOMContentLoaded", () => {

  const dismiss = document.getElementById("install-dismiss");
  const banner = document.getElementById("install-banner");
  if (btn) btn.addEventListener("click", async () => { if (deferredPrompt) { deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; } if (banner) banner.style.display = "none"; });

});
